    <div class="verificacion-wrapper">
        <div class="verificacion-caja">
            <h1>Verificar Certificado</h1>
            <p>Ingresa el código único del certificado para comprobar su validez y estado en nuestra base de datos oficial.</p>
            
            <input type="text" id="inputCodigo" placeholder="Ingresa el código (Ej: 650)">
            <button class="btn-validar" onclick="verificarCertificado()">Validar Certificado</button>
            
            <div id="resultado-validacion"></div>
